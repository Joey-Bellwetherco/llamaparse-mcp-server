<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BW Document Parser</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-card: #ffffff;
    --bg-drop: #FAFBFD;
    --bg-drop-hover: #F0F6FD;
    --bg-result: #F7F9FB;
    --border: #D6DEE8;
    --border-drop: #B8C9DB;
    --text: #1C2B5A;
    --text-secondary: #6B7A8D;
    --text-muted: #A3B0B8;
    --accent: #0073E5;
    --accent-hover: #005BB5;
    --success: #27AE60;
    --error: #C0392B;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #212121;
      --bg-card: #2A2A2A;
      --bg-drop: #303030;
      --bg-drop-hover: #383838;
      --bg-result: #333333;
      --border: #444444;
      --border-drop: #555555;
      --text: #E8E8E8;
      --text-secondary: #A0A0A0;
      --text-muted: #777777;
      --accent: #4DA3FF;
      --accent-hover: #3B8DE0;
      --success: #2ECC71;
      --error: #E74C3C;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); padding: 0; }
  .card { border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px;
          max-width: 480px; margin: 0 auto; background: var(--bg-card); }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
            padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .header .accent-bar { width: 4px; height: 20px; background: var(--accent); border-radius: 2px; }
  .header .title { font-size: 13px; font-weight: 600; letter-spacing: 0.6px;
                   color: var(--text); text-transform: uppercase; }
  .header .title span { color: var(--accent); }
  .drop-zone { border: 1.5px dashed var(--border-drop); border-radius: 8px; padding: 28px 20px;
               cursor: pointer; transition: all 0.15s; background: var(--bg-drop);
               display: flex; flex-direction: column; align-items: center;
               justify-content: center; text-align: center; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--bg-drop-hover); }
  .drop-zone input { display: none; }
  .drop-zone .icon { font-size: 22px; margin-bottom: 4px; opacity: 0.45; }
  .drop-zone p { color: var(--text-secondary); font-size: 13px; }
  .drop-zone .formats { font-size: 10px; color: var(--text-muted); margin-top: 3px;
                        letter-spacing: 0.5px; text-transform: uppercase; }
  #status { margin-top: 12px; }
  .parsing { color: var(--accent); font-size: 13px; display: flex; align-items: center;
             justify-content: center; gap: 8px; padding: 6px 0; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border-drop);
             border-top-color: var(--accent); border-radius: 50%;
             animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .done-msg { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
              background: var(--bg-result); border: 1px solid var(--border); border-radius: 8px;
              font-size: 13px; color: var(--text); }
  .done-msg .check { color: var(--success); font-size: 16px; flex-shrink: 0; }
  .done-msg .info { flex: 1; }
  .done-msg .detail { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .error { color: var(--error); font-size: 12px; padding: 6px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="accent-bar"></div>
    <div class="title"><span>Bellwether</span> Document Parser</div>
  </div>
  <div class="drop-zone" id="dropZone">
    <div class="icon">&#128462;</div>
    <p>Drag & drop a file here, or click to browse</p>
    <div class="formats">PDF &middot; PNG &middot; JPG &middot; TIFF</div>
    <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.tiff,.gif,.bmp,.webp">
  </div>
  <div id="status"></div>
</div>
<script>
const SERVER_URL = 'https://bw-parse-mcp-server.up.railway.app';
const LARGE_CHAR_LIMIT = 50000;
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');

const _rpcCallbacks = {};
function rpcRequest(method, params) {
  return new Promise((resolve, reject) => {
    const id = Math.random().toString(36).slice(2);
    _rpcCallbacks[id] = { resolve, reject };
    window.parent.postMessage({ jsonrpc: '2.0', id, method, params }, '*');
    setTimeout(() => {
      if (_rpcCallbacks[id]) {
        delete _rpcCallbacks[id];
        reject(new Error('MCP request timed out'));
      }
    }, 120000);
  });
}

function notifyHeight() {
  try {
    if (window.openai && window.openai.notifyIntrinsicHeight) {
      window.openai.notifyIntrinsicHeight(document.querySelector('.card').offsetHeight + 4);
    }
  } catch (e) {}
}

function sendToChat(message) {
  window.parent.postMessage({
    jsonrpc: '2.0', method: 'ui/message',
    id: Math.random().toString(36).slice(2),
    params: { role: 'user', content: [{ type: 'text', text: message }] }
  }, '*');
}

function showDone(filename, pages, chars, extra) {
  status.innerHTML = `
    <div class="done-msg">
      <div class="check">&#10003;</div>
      <div class="info">
        <strong>${filename}</strong>
        <div class="detail">${pages} page${pages !== 1 ? 's' : ''} &middot; ${Number(chars).toLocaleString()} chars${extra ? ' &middot; ' + extra : ''}</div>
      </div>
    </div>`;
  notifyHeight();
  // Reset to drop zone after a few seconds
  setTimeout(() => {
    status.innerHTML = '';
    fileInput.value = '';
    notifyHeight();
  }, 4000);
}

function showError(msg) {
  status.innerHTML = '<div class="error">' + msg + '</div>';
  notifyHeight();
}

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  status.innerHTML = '<div class="parsing"><div class="spinner"></div>Parsing ' + file.name + '...</div>';
  notifyHeight();

  try {
    if (!(window.openai && window.openai.uploadFile)) {
      showError('OpenAI file API not available');
      return;
    }

    // Step 1: Upload file to OpenAI
    let uploadResult;
    try {
      uploadResult = await window.openai.uploadFile(file);
    } catch (e) {
      showError('Upload failed: ' + e.message);
      return;
    }

    // Step 2: Get download URL
    let fileUrl;
    try {
      const dlResult = await window.openai.getFileDownloadUrl({ fileId: uploadResult.fileId });
      fileUrl = dlResult.url || dlResult.download_url || dlResult.downloadUrl
        || (dlResult.data && (dlResult.data.url || dlResult.data.download_url))
        || (typeof dlResult === 'string' ? dlResult : null);
      if (!fileUrl) {
        showError('Could not get file URL: ' + JSON.stringify(dlResult).slice(0, 200));
        return;
      }
    } catch (e) {
      showError('Get URL failed: ' + e.message);
      return;
    }

    // Step 3: Parse via MCP bridge
    let result;
    try {
      result = await rpcRequest('tools/call', {
        name: 'parse_from_url',
        arguments: { url: fileUrl, filename: file.name },
      });
    } catch (e) {
      showError('Parse failed: ' + e.message);
      return;
    }

    // Step 4: Extract result
    let data;
    if (result && result.content) {
      const textItem = result.content.find(c => c.type === 'text');
      if (textItem) {
        try { data = JSON.parse(textItem.text); } catch (e) { data = null; }
      }
    }
    if (!data || !data.document_id) {
      showError('Parse returned no result.');
      return;
    }

    // Step 5: Auto-send to chat based on size
    const baseName = file.name.replace(/\.[^.]+$/, '');
    const dlUrl = SERVER_URL + '/download/' + data.document_id;

    if (data.chars > LARGE_CHAR_LIMIT) {
      // Large doc — send download link to chat
      sendToChat('I just parsed "' + (data.filename || file.name) + '" (' + data.pages + ' pages, ' + Number(data.chars).toLocaleString() + ' characters). The document is too large to display inline.\n\nDownload the parsed markdown here: [' + baseName + '.md](' + dlUrl + ')');
      showDone(data.filename || file.name, data.pages, data.chars, 'download link sent to chat');
    } else {
      // Small doc — send full text to chat
      try {
        const r = await fetch(SERVER_URL + '/result/' + data.document_id);
        const text = await r.text();
        const mdFilename = baseName + '.md';
        sendToChat('INSTRUCTION: Write the following text EXACTLY as-is to a file called "' + mdFilename + '" and provide a download link. Do NOT summarize, modify, truncate, or comment on the content. Just write it to the file.\n\n---BEGIN FILE CONTENT---\n' + text + '\n---END FILE CONTENT---');
        showDone(data.filename || file.name, data.pages, data.chars, 'sent to chat');
      } catch (e) {
        // fetch blocked — fall back to download link
        sendToChat('I just parsed "' + (data.filename || file.name) + '" (' + data.pages + ' pages). Download the parsed markdown here: [' + baseName + '.md](' + dlUrl + ')');
        showDone(data.filename || file.name, data.pages, data.chars, 'download link sent to chat');
      }
    }

  } catch (e) {
    showError('Error: ' + e.message);
  }
}

window.addEventListener('load', notifyHeight);
window.addEventListener('message', (event) => {
  if (event.source !== window.parent) return;
  const msg = event.data;
  if (!msg || msg.jsonrpc !== '2.0') return;
  if (msg.id && _rpcCallbacks[msg.id]) {
    const cb = _rpcCallbacks[msg.id];
    delete _rpcCallbacks[msg.id];
    if (msg.error) cb.reject(new Error(msg.error.message || JSON.stringify(msg.error)));
    else cb.resolve(msg.result);
    return;
  }
  if (msg.method === 'ui/initialize') {
    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/notifications/initialized', params: {} }, '*');
    notifyHeight();
  }
});
</script>
</body>
</html>
