<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BW Document Parser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Avenir LT Std', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #fff; color: #1C2B5A; padding: 0; }
  .card { border: 1px solid #D6DEE8; border-radius: 10px; padding: 20px 24px;
          max-width: 480px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
            padding-bottom: 12px; border-bottom: 1px solid #EDF1F5; }
  .header .logo { width: 6px; height: 24px; background: #0073E5; border-radius: 3px; }
  .header .title { font-size: 13px; font-weight: 600; letter-spacing: 0.8px;
                   color: #1C2B5A; text-transform: uppercase; }
  .header .title span { color: #0073E5; }
  .drop-zone { border: 1.5px dashed #B8C9DB; border-radius: 8px; padding: 32px 20px;
               cursor: pointer; transition: all 0.15s; background: #FAFBFD;
               display: flex; flex-direction: column; align-items: center;
               justify-content: center; text-align: center; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #0073E5; background: #F0F6FD; }
  .drop-zone input { display: none; }
  .drop-zone .icon { font-size: 24px; margin-bottom: 6px; opacity: 0.5; }
  .drop-zone p { color: #6B7A8D; font-size: 13px; }
  .drop-zone .formats { font-size: 10px; color: #A3B0B8; margin-top: 3px;
                        letter-spacing: 0.5px; text-transform: uppercase; }
  #status { margin-top: 14px; }
  .parsing { color: #0073E5; font-size: 13px; display: flex; align-items: center;
             justify-content: center; gap: 8px; padding: 8px 0; }
  .parsing .spinner { width: 14px; height: 14px; border: 2px solid #B8C9DB;
                      border-top-color: #0073E5; border-radius: 50%;
                      animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { background: #F7F9FB; border: 1px solid #D6DEE8; border-radius: 8px;
            padding: 12px 14px; }
  .result .meta { font-size: 13px; color: #1C2B5A; margin-bottom: 10px; line-height: 1.4; }
  .result .meta strong { font-weight: 600; }
  .result .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 14px;
         border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
         text-decoration: none; transition: all 0.15s; border: none; }
  .btn-primary { background: #0073E5; color: #fff; }
  .btn-primary:hover { background: #005BB5; }
  .btn-secondary { background: #fff; color: #1C2B5A; border: 1px solid #D6DEE8; }
  .btn-secondary:hover { background: #F0F6FD; border-color: #0073E5; }
  .btn svg { width: 14px; height: 14px; fill: currentColor; }
  .copied { font-size: 11px; color: #0073E5; font-weight: 500; }
  .error { color: #C0392B; font-size: 12px; padding: 6px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo"></div>
    <div class="title"><span>Bellwether</span> Document Parser</div>
  </div>
  <div class="drop-zone" id="dropZone">
    <div class="icon">&#128462;</div>
    <p>Drag & drop a file here, or click to browse</p>
    <div class="formats">PDF &middot; PNG &middot; JPG &middot; TIFF</div>
    <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.tiff,.gif,.bmp,.webp">
  </div>
  <div id="status"></div>
</div>
<script>
const SERVER_URL = 'https://bw-parse-mcp-server.up.railway.app';
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');

// JSON-RPC helper to call MCP tools via the ChatGPT bridge
function rpcRequest(method, params) {
  return new Promise((resolve, reject) => {
    const id = Math.random().toString(36).slice(2);
    const listener = (event) => {
      if (event.source !== window.parent) return;
      const msg = event.data;
      if (!msg || msg.id !== id) return;
      window.removeEventListener('message', listener);
      if (msg.error) reject(new Error(msg.error.message || 'RPC error'));
      else resolve(msg.result);
    };
    window.addEventListener('message', listener);
    window.parent.postMessage({ jsonrpc: '2.0', method, params, id }, '*');
  });
}

function notifyHeight() {
  try {
    if (window.openai && window.openai.notifyIntrinsicHeight) {
      window.openai.notifyIntrinsicHeight(document.querySelector('.card').offsetHeight + 4);
    }
  } catch (e) {}
}

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  status.innerHTML = '<div class="parsing"><div class="spinner"></div>Parsing ' + file.name + '...</div>';
  notifyHeight();

  try {
    const form = new FormData();
    form.append('file', file);
    const resp = await fetch(SERVER_URL + '/parse?parser=mistral', { method: 'POST', body: form });
    if (!resp.ok) { showError('Server returned ' + resp.status); return; }
    const data = await resp.json();
    if (data.error) { showError(data.error); return; }
    showSuccess(data, file.name);
  } catch (e) {
    showError(e.message);
  }
}

function showSuccess(data, filename) {
  const resultUrl = SERVER_URL + '/result-file/' + data.document_id;
  const baseName = filename.replace(/\.[^.]+$/, '');
  status.innerHTML = `
    <div class="result">
      <div class="meta"><strong>${data.filename || filename}</strong><br>${data.pages} page${data.pages !== 1 ? 's' : ''} &middot; ${Number(data.chars).toLocaleString()} characters extracted</div>
      <div class="actions">
        <button class="btn btn-primary" id="dlBtn">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          Send to chat
        </button>
        <button class="btn btn-secondary" id="newBtn">Parse another</button>
      </div>
    </div>`;
  document.getElementById('dlBtn').addEventListener('click', async () => {
    const btn = document.getElementById('dlBtn');
    btn.textContent = 'Getting file...';
    try {
      // Call the get_parsed_file tool via MCP bridge to return file to ChatGPT
      const result = await rpcRequest('tools/call', {
        name: 'get_parsed_file',
        arguments: { document_id: data.document_id },
      });
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg> File ready';
    } catch (e) {
      btn.textContent = 'Failed: ' + e.message;
    }
  });
  document.getElementById('newBtn').addEventListener('click', () => {
    status.innerHTML = '';
    fileInput.value = '';
    notifyHeight();
  });
  notifyHeight();
}

function showError(msg) {
  status.innerHTML = '<div class="error">' + msg + '</div>';
  notifyHeight();
}

window.addEventListener('load', notifyHeight);
window.addEventListener('message', (event) => {
  if (event.source !== window.parent) return;
  const msg = event.data;
  if (!msg || msg.jsonrpc !== '2.0') return;
  if (msg.method === 'ui/initialize') {
    window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/notifications/initialized', params: {} }, '*');
    notifyHeight();
  }
});
</script>
</body>
</html>
